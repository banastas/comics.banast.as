<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta Tags — title/description/keywords are managed dynamically per-route by src/components/SEO.tsx. These defaults show before JS runs. -->
    <title>comics.banast.as - Track, Organize & Value Your Comics</title>
    <meta name="description" content="Professional comic book collection management system. Track your comics, monitor values, organize by series, artists, and storage locations." />
    <meta name="author" content="banastas" />
    <meta name="theme-color" content="#0d1117" />

    <!-- Canonical URL is managed dynamically per route -->

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://comics.banast.as/" />
    <meta property="og:title" content="comics.banast.as - Track, Organize & Value Your Comics" />
    <meta property="og:description" content="Professional comic book collection management system. Track your comics, monitor values, organize by series, artists, and storage locations." />
    <meta property="og:image" content="https://comics.banast.as/og-image.jpg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="comics.banast.as" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:url" content="https://comics.banast.as/" />
    <meta name="twitter:title" content="comics.banast.as - Track, Organize & Value Your Comics" />
    <meta name="twitter:description" content="Professional comic book collection management system. Track your comics, monitor values, organize by series, artists, and storage locations." />
    <meta name="twitter:image" content="https://comics.banast.as/twitter-image.jpg" />
    <meta name="twitter:creator" content="@banastas" />

    <!-- Favicon -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Web App Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Fonts — preload CSS with non-blocking fallback -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="preload"
      as="style"
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      onload="this.onload=null;this.rel='stylesheet'"
    />
    <noscript>
      <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" />
    </noscript>

    <!-- Resource Hints -->
    <link rel="preconnect" href="https://www.googletagmanager.com" />
    <link rel="dns-prefetch" href="https://www.googletagmanager.com" />
    <link rel="preconnect" href="https://www.google-analytics.com" />
    <link rel="dns-prefetch" href="https://www.google-analytics.com" />

    <!-- Robots -->
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:-1, max-video-preview:-1" />

    <!-- Legacy hash-route bridge -->
    <script>
      if (window.location.hash && window.location.hash.startsWith('#/')) {
        window.history.replaceState(null, '', window.location.hash.slice(1));
      }
    </script>

    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-ZDMFMRZTBZ"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-ZDMFMRZTBZ', {
        send_page_view: false,
        page_path: window.location.pathname + window.location.search + window.location.hash
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
